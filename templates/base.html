<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Тлумачний словник ІТ-термінів{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}?v=20260425-1">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1><a href="{% url 'home' %}">Тлумачний словник ІТ-термінів</a></h1>
            <nav>
                <a href="{% url 'home' %}">Головна</a>
                <a href="{% url 'term_list' %}">Терміни</a>
                <a href="{% url 'category_list' %}">Категорії</a>
                <a href="{% url 'submit_suggestion' %}">Запропонувати термін</a>
                <a href="{% url 'about' %}">Про проєкт</a>
                <a href="/admin/">Адмінка</a>
            </nav>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <div class="container">
            <p>Кваліфікаційний проєкт: вебсайт тлумачного словника інформаційно-комп'ютерних термінів.</p>
        </div>
    </footer>
</body>
</html>
